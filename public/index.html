<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashfree Payment Integration</title>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .payment-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 1rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <h2>Checkout</h2>
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="John Doe" value="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="john@example.com" value="john@example.com">
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="9999999999" value="9999999999">
        </div>
        <div class="form-group">
            <label for="amount">Amount (INR)</label>
            <input type="number" id="amount" placeholder="1.00" value="1.00" step="0.01">
        </div>
        <button id="pay-btn">Pay Now</button>
        <div id="loader" class="loader">Processing... Please wait</div>
    </div>

    <script>
        const cashfree = Cashfree({
            mode: "sandbox" // Change to "production" for live
        });

        document.getElementById('pay-btn').addEventListener('click', async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;

            if (!name || !email || !phone || !amount) {
                alert("Please fill all fields");
                return;
            }

            const payBtn = document.getElementById('pay-btn');
            const loader = document.getElementById('loader');

            payBtn.disabled = true;
            loader.style.display = 'block';

            try {
                const response = await fetch('/create-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        customer_name: name,
                        customer_email: email,
                        customer_phone: phone,
                        order_amount: amount
                    })
                });

                const data = await response.json();

                if (data.payment_session_id) {
                    cashfree.checkout({
                        paymentSessionId: data.payment_session_id,
                        redirectTarget: "_self"
                    });
                } else {
                    alert("Error: " + (data.message || "Failed to create payment session"));
                    payBtn.disabled = false;
                    loader.style.display = 'none';
                }
            } catch (error) {
                console.error("Payment Error:", error);
                alert("An error occurred. Please try again.");
                payBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
